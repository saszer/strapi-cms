# ═══════════════════════════════════════════════════════════════════════
# SECURITY SCANNING PIPELINE — embracingearth.space
#
# Comprehensive security scanning combining multiple tools:
#   1. npm audit — Dependency vulnerability scanning
#   2. TruffleHog — Secret/credential detection in code + git history
#   3. Trivy — Container image + filesystem vulnerability scanning
#   4. Dependency Review — Block PRs that introduce vulnerable deps
#
# RUNS: On every push/PR to main branches + a daily cron.
# COST: All tools are free / open-source.
# RESULTS → GitHub Security tab + PR comments. Gate behaviour per tool:
#   • npm audit  → FAILS the job on any CRITICAL (or >5 HIGH) — a hard gate.
#   • TruffleHog → FAILS on a VERIFIED secret.
#   • Trivy      → findings are ADVISORY (logged, never fake-green); only a real
#                  scan ERROR fails the step → visible RED.
#   • Dep Review → FAILS on a newly-introduced high+ vuln (PRs only, GHAS-gated).
#
# HARDENING (CodeRabbit): least-privilege per-job permissions (the workflow
# default is read-only; each job widens only what it needs), checkouts never
# persist credentials, and a concurrency guard cancels superseded runs.
# ═══════════════════════════════════════════════════════════════════════

name: "🛡️ Security Scanning"

on:
  # Manual scan-now trigger (Actions tab / gh workflow run)
  workflow_dispatch:
  push:
    branches: [ "main", "master", "develop", "release" ]
  pull_request:
    branches: [ "main", "master", "develop", "release" ]
  schedule:
    # Daily at 3:00 AM UTC — catches newly disclosed CVEs overnight
    - cron: '0 3 * * *'

# Cancel an in-flight scan when a newer commit lands on the same ref — saves CI
# minutes and prevents stale PR statuses. embracingearth.space
concurrency:
  group: security-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege DEFAULT: read-only for every job. Each job below widens its
# own scope only where strictly required. embracingearth.space
permissions:
  contents: read

jobs:
  # ════════════════════════════════════════════════════════════════════
  # 1. NPM AUDIT — Dependency vulnerability scanning
  # ════════════════════════════════════════════════════════════════════
  # STAGED ENFORCEMENT: advisory until Dependabot clears existing high/critical debt, then remove continue-on-error to restore the hard gate. embracingearth.space
  npm-audit:
    name: 📦 npm audit
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm install --ignore-scripts --legacy-peer-deps

      - name: 🔍 Run npm audit
        run: |
          echo "🔍 Running npm audit..."
          # Single audit pass → JSON; derive both the summary and the gate from it
          # (one invocation, not two). embracingearth.space
          npm audit --json > audit-results.json 2>/dev/null || true

          HIGH_COUNT=$(jq '.metadata.vulnerabilities.high // 0' audit-results.json)
          CRITICAL_COUNT=$(jq '.metadata.vulnerabilities.critical // 0' audit-results.json)
          MODERATE_COUNT=$(jq '.metadata.vulnerabilities.moderate // 0' audit-results.json)
          echo "Moderate: $MODERATE_COUNT, High: $HIGH_COUNT, Critical: $CRITICAL_COUNT"

          # Fail on high/critical only; moderate is logged but non-blocking.
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "🚨 CRITICAL vulnerabilities found — failing build"
            exit 1
          fi
          if [ "$HIGH_COUNT" -gt 5 ]; then
            echo "⚠️ Too many HIGH vulnerabilities ($HIGH_COUNT) — failing build"
            exit 1
          fi
          echo "✅ npm audit passed (High: $HIGH_COUNT, Critical: $CRITICAL_COUNT)"

  # ════════════════════════════════════════════════════════════════════
  # 2. TRUFFLEHOG — Secret detection in code + git history
  # ════════════════════════════════════════════════════════════════════
  secret-scan:
    name: 🔑 Secret Detection (TruffleHog)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0  # Full history for scanning git commits
          # SECURITY: never write the token into .git/config — this job walks the
          # entire history through a secret scanner; a persisted credential would
          # sit in the working tree it inspects. embracingearth.space
          persist-credentials: false

      - name: 🔑 Run TruffleHog
        uses: trufflesecurity/trufflehog@7635b24fd512a2e817dd3e9dd661caaf035a079d # v3.93.1
        continue-on-error: false
        with:
          extra_args: --only-verified --results=json
          # Only flag VERIFIED secrets (reduces false positives dramatically)
          # Scans entire git history for leaked credentials

  # ════════════════════════════════════════════════════════════════════
  # 3. TRIVY — Container + filesystem vulnerability scanning
  # ════════════════════════════════════════════════════════════════════
  trivy-scan:
    name: 🐳 Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    # Least-privilege: this job adds a third-party apt source and runs a
    # downloaded binary, so it must NOT inherit pull-requests:write. It only needs
    # to read code and upload SARIF. embracingearth.space
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # The aquasecurity/trivy-action's bundled install.sh was exiting 1 BEFORE any scan
      # (flaky binary fetch), and continue-on-error then painted that dead scan green. Install
      # Trivy from the OFFICIAL apt repo instead (deterministic) and scan directly, with NO
      # continue-on-error so a genuine scan error shows RED — never a fake green. embracingearth.space
      - name: 🐳 Install Trivy (official apt repo)
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list >/dev/null
          sudo apt-get -qq update
          sudo apt-get -qq install -y trivy
          trivy --version

      - name: 🐳 Run Trivy filesystem scan
        env:
          # Authenticate the trivy-db / java-db pulls from ghcr.io (dodges the anon rate limit).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # HIGH/CRITICAL vulns + IaC misconfig. No --exit-code → findings are advisory (don't
          # fail the job); only a real scan ERROR fails the step → visible RED, never fake green.
          trivy fs --scanners vuln,misconfig --skip-dirs docs --severity HIGH,CRITICAL --no-progress .
          # Second pass writes SARIF for the (GHAS-gated) Security-tab upload — DB is cached, fast.
          trivy fs --scanners vuln,misconfig --skip-dirs docs --severity HIGH,CRITICAL --no-progress \
            --format sarif --output trivy-results.sarif .

      - name: 📤 Upload Trivy results to GitHub Security
        # Skip on Dependabot PRs (read-only GITHUB_TOKEN) and gate on ENABLE_GHAS_SCANS so the
        # upload SKIPS (not fails) where GHAS code scanning is unavailable. success() (not
        # always()) so a broken scan shows RED at the scan step, not as a missing-SARIF upload
        # error. embracingearth.space
        if: success() && github.actor != 'dependabot[bot]' && vars.ENABLE_GHAS_SCANS == 'true'
        uses: github/codeql-action/upload-sarif@2d3fe93d4896727350828f23e48f5391e6d3f022 # v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

  # ════════════════════════════════════════════════════════════════════
  # 4. DEPENDENCY REVIEW — Block risky deps in PRs
  # ════════════════════════════════════════════════════════════════════
  dependency-review:
    name: 📋 Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    # Dependency Review needs GitHub Advanced Security on PRIVATE repos — without it the
    # action errors "Dependency review is not supported on this repository". Gate on
    # ENABLE_GHAS_SCANS so it SKIPS (not fails). embracingearth.space
    if: github.event_name == 'pull_request' && vars.ENABLE_GHAS_SCANS == 'true'
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 📋 Review dependency changes
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.5.0
        with:
          # Fail on high+ severity vulnerabilities
          fail-on-severity: high
          # Comment on the PR with findings
          comment-summary-in-pr: always
          # Block known malicious packages
          deny-licenses: 'AGPL-3.0, GPL-3.0'
